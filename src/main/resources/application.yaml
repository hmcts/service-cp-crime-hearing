server:
  port: ${SERVER_PORT:8082}
  shutdown: "graceful"

management:
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true   # enables liveness / readiness groups
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  tracing:
    enabled: true
    sampling:
      probability: 1.0

spring:
  config:
    import: "optional:configtree:/mnt/secrets/rpe/"
  application:
    name: service-cp-crime-hearing
  jackson:
    default-property-inclusion: non_null
  web:
    resources:
      add-mappings: false     # disable serving any static resources

hearing-client:
  url: ${CP_BACKEND_URL:http://localhost:8081}
  path: /hearing-query-api/query/api/rest/hearing/timeline
  get-path: /hearing-query-api/query/api/rest/hearing/hearings
  cjscppuid: ${CJSCPPUID:00000000-0000-0000-0000-000000000000}

case-mapper-client:
  url: ${AMP_BACKEND_URL:http://localhost:8081}
  path: /urnmapper

azure:
  application-insights:
    instrumentation-key: ${rpe.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

logging:
  level:
    root: INFO