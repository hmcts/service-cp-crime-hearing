spring:
  application:
    name: service-cp-crime-hearing

server:
  port: ${SERVER_PORT:8082}

hearing-client:
  url: ${CP_BACKEND_URL:http://localhost:8081}
  path: /hearing-query-api/query/api/rest/hearing/timeline
  get-path: /hearing-query-api/query/api/rest/hearing/hearings
  cjscppuid: ${CJSCPPUID:}

case-mapper-client:
  url: ${AMP_BACKEND_URL:http://localhost:8081}
  path: /urnmapper

azure:
  application-insights:
    instrumentation-key: ${rpe.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true   # enables liveness / readiness groups

logging:
  level:
    root: INFO
