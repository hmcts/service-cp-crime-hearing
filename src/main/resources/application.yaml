spring:
  application:
    name: service-cp-crime-hearing

server:
  port: ${SERVER_PORT:8082}

cp:
  backend-url: ${CP_BACKEND_URL}
  cjscppuid: ${CJSCPPUID:}

azure:
  application-insights:
    instrumentation-key: ${rpe.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true   # enables liveness / readiness groups

logging:
  level:
    root: INFO
